<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // SPA redirect for GitHub Pages: rewrites /Nylunds/path to /?/path
      // so index.html can pick it up and let React Router handle it.
      var seg = location.pathname.replace('/Nylunds', '').replace(/\/+$/, '');
      if (seg) {
        location.replace('/Nylunds/?p=' + encodeURIComponent(seg) + location.hash);
      } else {
        location.replace('/Nylunds/');
      }
    </script>
  </head>
</html>
